    <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Document</title>
            <!-- Bootstrap 5 CDN -->
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" type="text/css" href="../estilos/juego.css">
        </head>
        <body>
            <h3 id="nombreCiudad" class="text-center my-4"> Una ciudad </h3>

            <div class="container-fluid d-flex mt-3">
                <div class="col-auto me-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <button class="btn btn-primary w-100 mb-2" type="button" 
                                    data-bs-toggle="collapse" data-bs-target="#menuHerramientas">
                                Herramientas
                            </button>
        
                            <div class="collapse" id="menuHerramientas">
                                <div class="d-grid gap-2 border-top pt-2">
                                    
                                    <button class="btn btn-outline-success" type="button" 
                                            data-bs-toggle="collapse" data-bs-target="#opcionesConstruir">
                                        Construir
                                    </button>
        
                                    <div class="collapse" id="opcionesConstruir">
                                        <div class="d-grid gap-2 ms-2 border-start ps-2 my-2">
                                            
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tiposResidencia">Edificios residenciales</button>
                                            <div class="collapse ms-2" id="tiposResidencia">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemCasa">Casa (Capacidad: 4, Costo: $1,000)</button>
                                                    <button class="btn btn-objeto border" id="itemApartamento">Apartamento (Capacidad: 12, Costo: $3,000)</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoComercial">Edificios comercial</button>
                                            <div class="collapse ms-2" id="tipoComercial">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemTienda">Tienda</button>
                                                    <button class="btn btn-objeto border" id="itemMall">Centro comercial</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoIndustrial">Edificios industrial</button>
                                            <div class="collapse ms-2" id="tipoIndustrial">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemFabrica">Fabrica</button>
                                                    <button class="btn btn-objeto border" id="itemGranja">Granja</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoServicio">Edificios de servicios</button>
                                            <div class="collapse ms-2" id="tipoServicio">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemPolicia">Policía</button>
                                                    <button class="btn btn-objeto border" id="itemBomberos">Bomberos</button>
                                                    <button class="btn btn-objeto border" id="itemHospital">Hospital</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoUtilidad">Edificios de utilidad</button>
                                            <div class="collapse ms-2" id="tipoUtilidad">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemPlanta">Planta electrica</button>
                                                    <button class="btn btn-objeto border" id="itemAgua">Planta de agua</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" id="itemParque">Parque</button>
                                            <button class="btn btn-sm btn-light border" id="btnConstruirVia">Vía</button>
                                        </div>
                                    </div>
        
                                    <button class="btn btn-outline-danger" id="btnDemoler">
                                        Destruir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            <div id="grid-container">
                <div id="mapa" class="mapa"></div>
            </div>
            <div class="col-auto ms-4">
                <div class="card shadow-sm panel-derecho">
                    <div class="card-body p-0 d-flex flex-column">
                        
                        <div class="seccion-panel border-bottom p-3">
                            <h6 class="titulo-seccion">Clima</h6>
                            <div id="clima-contenido">
                                </div>
                        </div>
            
                        <div class="seccion-panel border-bottom p-3">
                            <h6 class="titulo-seccion">Noticias</h6>
                            <div id="noticias-contenido">
                                </div>
                        </div>
            
                        <div class="seccion-panel p-3">
                            <h6 class="titulo-seccion">Estadísticas</h6>
                            <div id="estadisticas-contenido">
                                <div class="list-group list-group-flush">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted small">puntaje</span>
                                        <span id="puntaje">a</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="text-muted small">Dinero</span>
                                        <span id="dinero" class="fw-bold">0</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="text-muted small">Agua</span>
                                        <span id="totalAgua" class="fw-bold">0</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="text-muted small">Comida</span>
                                        <span id="totalComida">100%</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted small">electricidad:</span>
                                        <span id="totalElectricidad">a</span>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted small">Felicidad:</span>
                                        <span id="promedioFelicidad">a</span>
                                    </div>
                                    
                                    <div class="mt-2 pt-2 border-top">
                                        <div class="d-flex justify-content-between align-items-center">
                                            <span class="text-muted small fw-bold">Total Residenciales</span>
                                            <span id="numResidencialTotal" class="fw-bold text-primary">0</span>
                                        </div>
                                        <div class="d-flex justify-content-between mt-1">
                                            <span class="text-muted extra-small">Casas: <span id="numCasas" class="text-dark">0</span></span>
                                            <span class="text-muted extra-small">Aptos: <span id="numApartamentos" class="text-dark">0</span></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
            
                    </div>
                </div>
            </div>
            
            <script type="module" src="../../negocio/controladorJuego.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </html>
